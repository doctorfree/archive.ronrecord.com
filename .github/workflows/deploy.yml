name: Deploy with LFS

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # CRITICAL: This instructs GitHub to pull down the real large files

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change to './dist' or './build' if using a frontend framework

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4